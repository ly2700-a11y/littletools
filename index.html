<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>学习桌宠监督器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="widget-titlebar" id="widgetTitlebar">
      <p class="title">学习桌宠</p>
      <div class="win-controls">
        <button id="pinBtn" class="win-btn" title="切换置顶">置顶: 开</button>
        <button id="minBtn" class="win-btn" title="最小化窗口">最小化</button>
        <button id="closeBtn" class="win-btn danger" title="关闭窗口">关闭</button>
      </div>
    </header>

    <main class="app">
      <header class="hero">
        <h1>学习桌宠监督器</h1>
        <p>专治学习时手痒摸鱼</p>
      </header>

      <section class="panel timer-panel">
        <div class="timer-head">
          <h2>专注计时</h2>
          <button id="settingsToggle" class="ghost small">⚙ 设置</button>
        </div>

        <div class="settings-drawer" id="settingsDrawer">
          <div class="settings-row">
            <label class="setting-item">
              <span>专注</span>
              <input type="number" id="inputFocus" min="1" max="180" value="25" />
              <span>分钟</span>
            </label>
            <label class="setting-item">
              <span>短休</span>
              <input type="number" id="inputShort" min="1" max="60" value="5" />
              <span>分钟</span>
            </label>
            <label class="setting-item">
              <span>长休</span>
              <input type="number" id="inputLong" min="1" max="120" value="15" />
              <span>分钟</span>
            </label>
          </div>

          <div class="seq-section">
            <p class="seq-label">自定义循环序列 <small>点击添加，点 × 删除</small></p>
            <div class="seq-add-btns">
              <button class="chip-add pomodoro" data-type="pomodoro">＋ 专注</button>
              <button class="chip-add shortBreak" data-type="shortBreak">＋ 短休</button>
              <button class="chip-add longBreak" data-type="longBreak">＋ 长休</button>
            </div>
            <div id="seqTrack" class="seq-track"></div>
            <div class="seq-footer">
              <button id="seqStandard" class="ghost small">标准番茄（4专注＋长休）</button>
              <button id="seqClear" class="ghost small">清空</button>
            </div>
          </div>
        </div>

        <div class="session-info-row">
          <span id="sessionBadge" class="session-badge pomodoro">专注 · 第1轮</span>
          <span id="seqProgress" class="seq-progress">1 / 5</span>
        </div>

        <p class="countdown" aria-live="polite">25:00</p>
        <div class="progress-bar" role="progressbar">
          <div id="progressFill" class="progress-fill"></div>
        </div>

        <div class="controls">
          <button id="startPauseBtn" class="primary">开始</button>
          <button id="skipBtn" class="ghost">跳过</button>
          <button id="resetBtn" class="ghost">重置</button>
        </div>

        <div class="stats">
          <article>
            <h3>完成专注轮次</h3>
            <p id="focusCount">0</p>
          </article>
          <article>
            <h3>摸鱼警告次数</h3>
            <p id="slackCount">0</p>
          </article>
        </div>
      </section>

      <section class="panel pet-panel">
        <div id="pet" class="pet calm" aria-label="桌宠状态">
          <div class="pet-face">
            <span class="eye eye-left"></span>
            <span class="eye eye-right"></span>
            <span class="mouth"></span>
          </div>
        </div>
        <p id="petText" class="pet-text">我盯着你学习，别开小差。</p>
      </section>

      <section class="panel rule-panel">
        <h2>监督规则</h2>
        <ul>
          <li>切到别的窗口或标签页超过 12 秒，记 1 次警告。</li>
          <li>警告达到 3 次，桌宠进入高压监督模式。</li>
          <li>每完成一次专注轮次，自动记录并保存。</li>
          <li>在设置里可以自定义时长和循环序列。</li>
        </ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
